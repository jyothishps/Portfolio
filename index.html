<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jyothish P S | Terminal</title>

  <!-- favicon -->
  <link class="fav-icon" rel="shortcut icon" href="./assets/images/logo.ico" type="image/x-icon">

  <!-- custom css link -->
  <link rel="stylesheet" href="./assets/css/style.css">

  <!-- google font link -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>

<body>
  <canvas id="matrix-bg"></canvas>
  <div class="scanlines"></div>
  
  <div class="terminal-window">
    <div class="terminal-header">
      <div class="window-controls">
        <span class="control close"></span>
        <span class="control minimize"></span>
        <span class="control maximize"></span>
      </div>
      <span class="window-title">jyothish@portfolio: ~ (bash)</span>
      <div class="status-indicator">
        <span id="live-clock" class="clock-text"></span>
        <span class="status-dot pulsing"></span>
        <span class="status-text">ONLINE</span>
      </div>
    </div>
    <div id="terminal">
      <div id="output"></div>
      <div id="input-line" class="input-line">
        <span class="prompt">jyothish@portfolio:~$</span>
        <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
      </div>
    </div>
  </div>

  <!-- Certificate Modal -->
  <div id="cert-modal" class="modal">
    <div class="modal-box">
      <div class="modal-header">
        <span id="modal-title">Certificate Viewer</span>
        <span class="close-modal">&times;</span>
      </div>
      <div class="modal-body">
        <img id="modal-img" src="" alt="Certificate">
      </div>
    </div>
  </div>

  <script src="./assets/js/script.js"></script>
</body>

</html>
